name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate JavaScript
        run: |
          node --check auspicious-core.js
          node --check tests.js
          node tests.js
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Prepare Pages artifact
        run: |
          mkdir -p public
          cp index.html auspicious-core.js manifest.json sw.js .nojekyll public/
          cp -R assets vendor public/
          test -f public/index.html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'public'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
